<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2048 — O'yin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0f1115;
    --panel:#181b21;
    --panel2:#20242c;
    --text:#eef1f6;
    --muted:#8a90a0;
    --accent:#f5a623;
    --board-bg:#22262f;
    --cell-bg:#2a2f39;
    --radius:12px;
    --gap:12px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%;
    width:100%;
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    position:fixed;
    inset:0;
    overflow:hidden;
    overscroll-behavior:none;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    height:100%;
    overflow-y:auto;
    padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 16px);
    display:flex;
    flex-direction:column;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    gap:10px;
  }
  h1{
    font-size:30px;
    margin:0;
    font-weight:800;
    background:linear-gradient(135deg,#f5a623,#f76b1c);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    letter-spacing:1px;
  }
  .scores{
    display:flex;
    gap:8px;
  }
  .score-box{
    background:var(--panel);
    border-radius:10px;
    padding:6px 12px;
    text-align:center;
    min-width:68px;
  }
  .score-box .label{
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.5px;
    font-weight:700;
  }
  .score-box .value{
    font-size:18px;
    font-weight:800;
    color:var(--text);
  }
  .toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    gap:10px;
  }
  .hint{
    font-size:13px;
    color:var(--muted);
    line-height:1.4;
  }
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    outline:none;
  }
  .btn{
    background:var(--accent);
    color:#20140a;
    font-weight:800;
    font-size:14px;
    padding:10px 16px;
    border-radius:10px;
    transition:transform .1s ease, filter .15s ease;
    white-space:nowrap;
  }
  .btn:active{
    transform:scale(.95);
    filter:brightness(.92);
  }
  .btn.secondary{
    background:var(--panel2);
    color:var(--text);
  }
  #board-wrap{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background:var(--board-bg);
    border-radius:16px;
    padding:var(--gap);
    box-shadow:0 10px 30px rgba(0,0,0,.4);
  }
  #board{
    position:relative;
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:var(--gap);
  }
  .cell-bg{
    background:var(--cell-bg);
    border-radius:10px;
  }
  #tiles-layer{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
  }
  .tile{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    font-weight:800;
    color:#2c2c2c;
    transition:top .12s ease, left .12s ease, background-color .1s ease;
    will-change:top,left,transform;
  }
  .tile-inner{
    animation:pop-in .16s ease;
  }
  .tile.merged .tile-inner{
    animation:pop-merge .16s ease;
  }
  @keyframes pop-in{
    0%{transform:scale(0);}
    80%{transform:scale(1.12);}
    100%{transform:scale(1);}
  }
  @keyframes pop-merge{
    0%{transform:scale(1);}
    50%{transform:scale(1.22);}
    100%{transform:scale(1);}
  }
  .tile[data-v="2"]{background:#eee4da; color:#776e65;}
  .tile[data-v="4"]{background:#ede0c8; color:#776e65;}
  .tile[data-v="8"]{background:#f2b179; color:#fff;}
  .tile[data-v="16"]{background:#f59563; color:#fff;}
  .tile[data-v="32"]{background:#f67c5f; color:#fff;}
  .tile[data-v="64"]{background:#f65e3b; color:#fff;}
  .tile[data-v="128"]{background:#edcf72; color:#fff; font-size:.9em;}
  .tile[data-v="256"]{background:#edcc61; color:#fff; font-size:.9em;}
  .tile[data-v="512"]{background:#edc850; color:#fff; font-size:.9em;}
  .tile[data-v="1024"]{background:#edc53f; color:#fff; font-size:.78em;}
  .tile[data-v="2048"]{background:#edc22e; color:#fff; font-size:.78em; box-shadow:0 0 22px 4px rgba(237,194,46,.7);}
  .tile[data-v="4096"], .tile[data-v="8192"]{background:#3c3a32; color:#f9f6f2; font-size:.7em;}

  footer{
    margin-top:16px;
  }
  .instructions{
    font-size:12px;
    color:var(--muted);
    text-align:center;
    line-height:1.5;
  }
  #dpad{
    margin-top:16px;
    width:150px;
    margin-left:auto;
    margin-right:auto;
    display:grid;
    grid-template-columns:52px 52px 52px;
    grid-template-rows:52px 52px 52px;
    gap:6px;
    justify-content:center;
  }
  .dpad-btn{
    background:var(--panel2);
    color:var(--text);
    font-size:20px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .08s ease, background .1s ease;
  }
  .dpad-btn:active{
    transform:scale(.9);
    background:var(--accent);
    color:#20140a;
  }
  .dpad-up{ grid-column:2; grid-row:1; }
  .dpad-left{ grid-column:1; grid-row:2; }
  .dpad-down{ grid-column:2; grid-row:3; }
  .dpad-right{ grid-column:3; grid-row:2; }

  #overlay{
    position:fixed;
    inset:0;
    background:rgba(10,11,14,.82);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
    backdrop-filter:blur(3px);
  }
  #overlay.show{
    display:flex;
    animation:fade-in .2s ease;
  }
  @keyframes fade-in{
    from{opacity:0;}
    to{opacity:1;}
  }
  .modal{
    background:var(--panel);
    border-radius:16px;
    padding:28px 24px;
    text-align:center;
    max-width:320px;
    width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    animation:modal-in .22s ease;
  }
  @keyframes modal-in{
    from{transform:scale(.85); opacity:0;}
    to{transform:scale(1); opacity:1;}
  }
  .modal h2{
    margin:0 0 8px;
    font-size:26px;
  }
  .modal.win h2{color:var(--accent);}
  .modal.lose h2{color:#e85c5c;}
  .modal p{
    color:var(--muted);
    margin:0 0 20px;
    font-size:14px;
  }
  .modal-actions{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box">
        <div class="label">Ball</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Rekord</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="hint">Bo'laklarni birlashtirib 2048 ga eting!</div>
    <button class="btn" id="newGameBtn">Yangi o'yin</button>
  </div>

  <div id="board-wrap">
    <div id="board">
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      <div id="tiles-layer"></div>
    </div>
  </div>

  <footer>
    <div class="instructions">
      Kompyuterda ← ↑ → ↓ tugmalarini ishlating, telefonda barmog'ingiz bilan sirg'anting yoki pastdagi tugmalardan foydalaning.
    </div>
    <div id="dpad">
      <button type="button" class="dpad-btn dpad-up" data-dir="1" aria-label="Yuqoriga">▲</button>
      <button type="button" class="dpad-btn dpad-left" data-dir="0" aria-label="Chapga">◀</button>
      <button type="button" class="dpad-btn dpad-down" data-dir="3" aria-label="Pastga">▼</button>
      <button type="button" class="dpad-btn dpad-right" data-dir="2" aria-label="O'ngga">▶</button>
    </div>
  </footer>
</div>

<div id="overlay">
  <div class="modal" id="modal">
    <h2 id="modalTitle"></h2>
    <p id="modalText"></p>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------- Telegram WebApp moslashuvi ---------- */
  var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if(tg){
    try{
      tg.ready();
      tg.expand();
      if(tg.setHeaderColor) tg.setHeaderColor("#0f1115");
      if(tg.setBackgroundColor) tg.setBackgroundColor("#0f1115");
      tg.disableVerticalSwipes && tg.disableVerticalSwipes();
    }catch(e){ /* Telegram muhitida bo'lmasa e'tiborsiz qoldiramiz */ }
  }

  /* ---------- Sozlamalar ---------- */
  var SIZE = 4;
  var STORAGE_BEST = "game2048_best";
  var STORAGE_STATE = "game2048_state";

  /* ---------- Holat ---------- */
  var grid = [];          // grid[r][c] = {id, value} yoki null
  var score = 0;
  var best = 0;
  var uid = 1;
  var won = false;
  var keepPlayingAfterWin = false;
  var gameOver = false;
  var moving = false;

  var scoreEl = document.getElementById("score");
  var bestEl = document.getElementById("best");
  var tilesLayer = document.getElementById("tiles-layer");
  var boardWrap = document.getElementById("board-wrap");
  var overlay = document.getElementById("overlay");
  var modal = document.getElementById("modal");
  var modalTitle = document.getElementById("modalTitle");
  var modalText = document.getElementById("modalText");
  var modalActions = document.getElementById("modalActions");
  var newGameBtn = document.getElementById("newGameBtn");

  /* ---------- Yordamchi funksiyalar ---------- */
  function emptyGrid(){
    var g = [];
    for(var r=0;r<SIZE;r++){
      g.push([null,null,null,null]);
    }
    return g;
  }

  function cloneValues(g){
    // faqat qiymatlarni solishtirish uchun (harakat borligini aniqlash)
    var out = [];
    for(var r=0;r<SIZE;r++){
      var row = [];
      for(var c=0;c<SIZE;c++){
        row.push(g[r][c] ? g[r][c].value : 0);
      }
      out.push(row);
    }
    return out;
  }

  function gridsEqual(a,b){
    for(var r=0;r<SIZE;r++)
      for(var c=0;c<SIZE;c++)
        if(a[r][c] !== b[r][c]) return false;
    return true;
  }

  function emptyCells(){
    var list = [];
    for(var r=0;r<SIZE;r++){
      for(var c=0;c<SIZE;c++){
        if(!grid[r][c]) list.push({r:r,c:c});
      }
    }
    return list;
  }

  function addRandomTile(){
    var cells = emptyCells();
    if(cells.length === 0) return null;
    var spot = cells[Math.floor(Math.random()*cells.length)];
    var value = Math.random() < 0.9 ? 2 : 4;
    var tile = { id: uid++, value: value, isNew:true };
    grid[spot.r][spot.c] = tile;
    return tile;
  }

  /* ---------- Saqlash ---------- */
  function loadBest(){
    var b = parseInt(localStorage.getItem(STORAGE_BEST), 10);
    best = isNaN(b) ? 0 : b;
    bestEl.textContent = best;
  }

  function saveBest(){
    localStorage.setItem(STORAGE_BEST, String(best));
  }

  function saveState(){
    var flat = [];
    for(var r=0;r<SIZE;r++){
      for(var c=0;c<SIZE;c++){
        var t = grid[r][c];
        flat.push(t ? {v:t.value} : null);
      }
    }
    var state = {
      grid: flat,
      score: score,
      won: won,
      keepPlayingAfterWin: keepPlayingAfterWin,
      gameOver: gameOver
    };
    try{
      localStorage.setItem(STORAGE_STATE, JSON.stringify(state));
    }catch(e){}
  }

  function loadState(){
    var raw;
    try{ raw = localStorage.getItem(STORAGE_STATE); }catch(e){ raw = null; }
    if(!raw) return false;
    var state;
    try{ state = JSON.parse(raw); }catch(e){ return false; }
    if(!state || !state.grid || state.grid.length !== SIZE*SIZE) return false;

    grid = emptyGrid();
    var i = 0;
    for(var r=0;r<SIZE;r++){
      for(var c=0;c<SIZE;c++){
        var cell = state.grid[i++];
        if(cell){
          grid[r][c] = { id: uid++, value: cell.v, isNew:false };
        }
      }
    }
    score = state.score || 0;
    won = !!state.won;
    keepPlayingAfterWin = !!state.keepPlayingAfterWin;
    gameOver = !!state.gameOver;
    return true;
  }

  function clearState(){
    try{ localStorage.removeItem(STORAGE_STATE); }catch(e){}
  }

  /* ---------- Chizish (render) ---------- */
  function cellMetrics(){
    var rect = boardWrap.getBoundingClientRect();
    var gap = 12;
    var inner = rect.width - gap*2;
    var size = (inner - gap*3) / 4;
    return { size: size, gap: gap };
  }

  function render(prevPositions, mergedIds, newIds){
    tilesLayer.innerHTML = "";
    var m = cellMetrics();
    for(var r=0;r<SIZE;r++){
      for(var c=0;c<SIZE;c++){
        var t = grid[r][c];
        if(!t) continue;
        var el = document.createElement("div");
        el.className = "tile";
        el.setAttribute("data-v", t.value);
        var left = c * (m.size + m.gap);
        var top = r * (m.size + m.gap);
        el.style.width = m.size + "px";
        el.style.height = m.size + "px";
        el.style.left = left + "px";
        el.style.top = top + "px";
        el.style.fontSize = (m.size * 0.42) + "px";

        var inner = document.createElement("div");
        inner.className = "tile-inner";
        inner.textContent = t.value;
        if(t.merged) el.classList.add("merged");
        el.appendChild(inner);
        tilesLayer.appendChild(el);
      }
    }
    scoreEl.textContent = score;
    bestEl.textContent = best;
  }

  /* ---------- O'yin harakati mantig'i ---------- */
  // Har bir yo'nalish uchun qatorlarni "chapga siljitish" mantig'iga keltiramiz.
  function getVector(dir){
    // 0: chap, 1: yuqori, 2: o'ng, 3: past
    switch(dir){
      case 0: return {dr:0, dc:-1};
      case 1: return {dr:-1, dc:0};
      case 2: return {dr:0, dc:1};
      case 3: return {dr:1, dc:0};
    }
  }

  function buildTraversals(vector){
    var rows = [], cols = [];
    for(var i=0;i<SIZE;i++){ rows.push(i); cols.push(i); }
    if(vector.dr === 1) rows.reverse();
    if(vector.dc === 1) cols.reverse();
    return {rows:rows, cols:cols};
  }

  function withinBounds(r,c){
    return r>=0 && r<SIZE && c>=0 && c<SIZE;
  }

  function findFarthest(r,c,vector){
    var prevR = r, prevC = c;
    var nr = r+vector.dr, nc = c+vector.dc;
    while(withinBounds(nr,nc) && !grid[nr][nc]){
      prevR = nr; prevC = nc;
      nr += vector.dr; nc += vector.dc;
    }
    return { farthest:{r:prevR,c:prevC}, next:{r:nr,c:nc} };
  }

  function move(dir){
    if(moving || gameOver) return;
    if(won && !keepPlayingAfterWin) return;

    var vector = getVector(dir);
    var trav = buildTraversals(vector);
    var moved = false;

    // merged belgilarini tozalash
    for(var r=0;r<SIZE;r++) for(var c=0;c<SIZE;c++){
      if(grid[r][c]){ grid[r][c].merged = false; grid[r][c].isNew = false; }
    }

    var mergedThisMove = [];

    trav.rows.forEach(function(r){
      trav.cols.forEach(function(c){
        var tile = grid[r][c];
        if(!tile) return;
        var res = findFarthest(r,c,vector);
        var farthest = res.farthest;
        var nextPos = res.next;
        var nextTile = withinBounds(nextPos.r,nextPos.c) ? grid[nextPos.r][nextPos.c] : null;

        if(nextTile && nextTile.value === tile.value && !nextTile.merged && !nextTile.mergedFrom){
          // birlashtirish
          var mergedValue = tile.value * 2;
          grid[r][c] = null;
          nextTile.value = mergedValue;
          nextTile.merged = true;
          nextTile.mergedFrom = true;
          score += mergedValue;
          moved = true;
          if(mergedValue === 2048 && !won){
            won = true;
          }
        } else {
          if(farthest.r !== r || farthest.c !== c){
            grid[farthest.r][farthest.c] = tile;
            grid[r][c] = null;
            moved = true;
          }
        }
      });
    });

    // mergedFrom flaglarini tozalash (keyingi harakatga aralashmasin)
    for(var rr=0;rr<SIZE;rr++) for(var cc=0;cc<SIZE;cc++){
      if(grid[rr][cc]) grid[rr][cc].mergedFrom = false;
    }

    if(moved){
      moving = true;
      var added = addRandomTile();
      render();
      if(score > best){
        best = score;
        saveBest();
      }
      saveState();
      moving = false;

      if(won && !keepPlayingAfterWin){
        setTimeout(showWin, 180);
      } else if(!canMove()){
        gameOver = true;
        saveState();
        setTimeout(showLose, 180);
      }
    }
  }

  function canMove(){
    if(emptyCells().length > 0) return true;
    for(var r=0;r<SIZE;r++){
      for(var c=0;c<SIZE;c++){
        var v = grid[r][c].value;
        if(c+1<SIZE && grid[r][c+1] && grid[r][c+1].value === v) return true;
        if(r+1<SIZE && grid[r+1][c] && grid[r+1][c].value === v) return true;
      }
    }
    return false;
  }

  /* ---------- Modal oynalar ---------- */
  function hideModal(){
    overlay.classList.remove("show");
  }

  function showWin(){
    modal.className = "modal win";
    modalTitle.textContent = "G'alaba! 🎉";
    modalText.textContent = "Siz 2048 ga erishdingiz! Davom etasizmi yoki yangi o'yin boshlaysizmi?";
    modalActions.innerHTML = "";

    var btnContinue = document.createElement("button");
    btnContinue.className = "btn secondary";
    btnContinue.textContent = "Davom etish";
    btnContinue.onclick = function(){
      keepPlayingAfterWin = true;
      saveState();
      hideModal();
    };

    var btnNew = document.createElement("button");
    btnNew.className = "btn";
    btnNew.textContent = "Yangi o'yin";
    btnNew.onclick = function(){
      hideModal();
      startNewGame();
    };

    modalActions.appendChild(btnContinue);
    modalActions.appendChild(btnNew);
    overlay.classList.add("show");
  }

  function showLose(){
    modal.className = "modal lose";
    modalTitle.textContent = "O'yin tugadi";
    modalText.textContent = "Afsuski, harakatlar qolmadi. Ballingiz: " + score;
    modalActions.innerHTML = "";

    var btnNew = document.createElement("button");
    btnNew.className = "btn";
    btnNew.textContent = "Qayta urinish";
    btnNew.onclick = function(){
      hideModal();
      startNewGame();
    };

    modalActions.appendChild(btnNew);
    overlay.classList.add("show");
  }

  /* ---------- Yangi o'yin ---------- */
  function startNewGame(){
    grid = emptyGrid();
    score = 0;
    won = false;
    keepPlayingAfterWin = false;
    gameOver = false;
    addRandomTile();
    addRandomTile();
    clearState();
    saveState();
    render();
    hideModal();
  }

  /* ---------- Klaviatura boshqaruvi ---------- */
  var KEY_DIR = {
    "ArrowLeft":0, "ArrowUp":1, "ArrowRight":2, "ArrowDown":3,
    "a":0,"w":1,"d":2,"s":3, "A":0,"W":1,"D":2,"S":3
  };
  window.addEventListener("keydown", function(e){
    if(KEY_DIR.hasOwnProperty(e.key)){
      e.preventDefault();
      move(KEY_DIR[e.key]);
    }
  }, {passive:false});

  // Ba'zi WebView/preview muhitlarida klaviatura fokusi sahifaga tushmasligi mumkin.
  // Shuning uchun sahifani fokuslanadigan qilib, yuklanganda fokus beramiz.
  document.body.setAttribute("tabindex","-1");
  window.addEventListener("load", function(){
    try{ document.body.focus(); }catch(e){}
  });
  document.addEventListener("click", function(){
    try{ document.body.focus(); }catch(e){}
  });

  /* ---------- Sensorli swipe boshqaruvi (Pointer Events) ---------- */
  // Pointer Events barmoq, sichqoncha va qalam uchun yagona, ishonchli API.
  // WebView ichida native scroll bilan to'qnashmasligi uchun document'ga bog'lanadi.
  var swipeStartX = 0, swipeStartY = 0;
  var swipeActive = false;
  var activePointerId = null;
  var SWIPE_THRESHOLD = 16;

  function onPointerDown(e){
    if(activePointerId !== null) return; // faqat bitta barmoq bilan ishlaymiz
    activePointerId = e.pointerId;
    swipeActive = true;
    swipeStartX = e.clientX;
    swipeStartY = e.clientY;
  }

  function onPointerUp(e){
    if(!swipeActive || e.pointerId !== activePointerId) return;
    swipeActive = false;
    activePointerId = null;

    var dx = e.clientX - swipeStartX;
    var dy = e.clientY - swipeStartY;
    var absDx = Math.abs(dx), absDy = Math.abs(dy);

    if(Math.max(absDx,absDy) < SWIPE_THRESHOLD) return;

    if(absDx > absDy){
      move(dx > 0 ? 2 : 0); // o'ng : chap
    } else {
      move(dy > 0 ? 3 : 1); // past : yuqori
    }
  }

  function onPointerCancel(e){
    if(e.pointerId === activePointerId){
      swipeActive = false;
      activePointerId = null;
    }
  }

  function onPointerMove(e){
    // Scroll/boshqa harakatlarning oldini olish, gesture davomida sahifa siljib ketmasin
    if(swipeActive && e.pointerId === activePointerId && e.cancelable){
      e.preventDefault();
    }
  }

  document.addEventListener("pointerdown", onPointerDown, {passive:true});
  document.addEventListener("pointerup", onPointerUp, {passive:true});
  document.addEventListener("pointercancel", onPointerCancel, {passive:true});
  document.addEventListener("pointermove", onPointerMove, {passive:false});

  // Eski WebView'lar uchun zaxira (fallback): agar Pointer Events yo'q bo'lsa,
  // xom touch hodisalaridan foydalanamiz.
  if(!window.PointerEvent){
    var touchStartX = 0, touchStartY = 0, touchActive = false;
    document.addEventListener("touchstart", function(e){
      if(e.touches.length !== 1) return;
      touchActive = true;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, {passive:true});
    document.addEventListener("touchmove", function(e){
      if(touchActive && e.cancelable) e.preventDefault();
    }, {passive:false});
    document.addEventListener("touchend", function(e){
      if(!touchActive) return;
      touchActive = false;
      var touch = e.changedTouches[0];
      var dx = touch.clientX - touchStartX;
      var dy = touch.clientY - touchStartY;
      var absDx = Math.abs(dx), absDy = Math.abs(dy);
      if(Math.max(absDx,absDy) < SWIPE_THRESHOLD) return;
      if(absDx > absDy){
        move(dx > 0 ? 2 : 0);
      } else {
        move(dy > 0 ? 3 : 1);
      }
    }, {passive:true});
  }

  /* ---------- Ekrandagi yo'nalish tugmalari (D-pad) ---------- */
  // Bu tugmalar barmoq bilan boshqarishning eng ishonchli usuli — oddiy
  // "tap" gesture'dan farqli o'laroq hech qanday muhitda tutib qolinmaydi.
  var dpad = document.getElementById("dpad");
  if(dpad){
    var dpadButtons = dpad.querySelectorAll(".dpad-btn");
    for(var di=0; di<dpadButtons.length; di++){
      (function(btn){
        var dir = parseInt(btn.getAttribute("data-dir"), 10);
        var firedByTouch = false;
        btn.addEventListener("touchend", function(e){
          firedByTouch = true;
          e.preventDefault();
          move(dir);
        }, {passive:false});
        btn.addEventListener("click", function(e){
          if(firedByTouch){ firedByTouch = false; return; }
          move(dir);
        });
      })(dpadButtons[di]);
    }
  }

  /* ---------- Tugmalar ---------- */
  newGameBtn.addEventListener("click", function(){
    if(gameOver || won){
      startNewGame();
      return;
    }
    // agar o'yin davom etayotgan bo'lsa ham tasdiqsiz qayta boshlaymiz (sodda UX)
    startNewGame();
  });

  window.addEventListener("resize", function(){
    render();
  });

  /* ---------- Ishga tushirish ---------- */
  function init(){
    loadBest();
    var restored = loadState();
    if(!restored){
      grid = emptyGrid();
      addRandomTile();
      addRandomTile();
    }
    render();

    if(gameOver){
      setTimeout(showLose, 300);
    } else if(won && !keepPlayingAfterWin){
      setTimeout(showWin, 300);
    }
  }

  init();
})();
</script>
</body>
</html>
