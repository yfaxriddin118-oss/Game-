<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Xotira Oʻyini — Juftlik Toping</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;
    font-family:'Trebuchet MS',sans-serif;
    background:radial-gradient(circle at 50% 0%, #fde2e4 0%, #f5c9d0 45%, #e8a0ac 100%);
  }
  #app{display:flex;flex-direction:column;align-items:center;height:100%;width:100%;}
  #title{font-size:16px;font-weight:800;color:#7a2e3a;text-align:center;margin:10px 0 4px;text-shadow:0 1px 0 #fff;}
  #topbar{display:flex;gap:10px;margin-bottom:10px;}
  .stat{background:#7a2e3a;color:#fff0e6;border:2px solid #4d1c24;border-radius:14px;padding:6px 14px;font-weight:bold;font-size:14px;}
  #boardWrap{width:min(94vw,440px);background:#fff5f2;border-radius:16px;padding:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2), inset 0 0 0 4px #e8a0ac;position:relative;}
  #grid{display:grid;gap:8px;}
  .card{
    aspect-ratio:1/1; border-radius:10px;
    background:linear-gradient(180deg,#e8536a,#c73854);
    display:flex;align-items:center;justify-content:center;
    font-size:min(7vw,32px);
    box-shadow:0 4px 0 #9c2a40, inset 0 0 0 2px rgba(255,255,255,0.2);
    cursor:pointer;
    transition:transform 0.15s;
    -webkit-tap-highlight-color:transparent;
  }
  .card.flipped, .card.matched{
    background:#fff2e0;
    box-shadow:0 4px 0 #d8b98e, inset 0 0 0 2px rgba(0,0,0,0.05);
  }
  .card.matched{opacity:0.55;}
  .card:active{transform:scale(0.94);}
  #overlay{position:absolute;inset:0;background:rgba(60,20,25,0.72);display:flex;align-items:center;justify-content:center;border-radius:16px;z-index:5;}
  #overlay.hide{display:none;}
  #card2{background:#fff5f2;border:3px solid #c73854;border-radius:18px;padding:26px 22px;text-align:center;width:80%;max-width:300px;}
  #card2 h2{margin:0 0 8px;color:#7a2e3a;}
  #card2 p{margin:4px 0 16px;font-size:14px;}
  .bigBtn{background:linear-gradient(180deg,#f06d84,#c73854);color:#fff;border:none;border-radius:14px;padding:12px 22px;font-size:16px;font-weight:bold;box-shadow:0 5px 0 #9c2a40;}
  .bigBtn:active{transform:translateY(4px);box-shadow:0 1px 0 #9c2a40;}
  #hint{font-size:12px;color:#7a2e3a;opacity:0.75;margin-top:8px;}
</style>
</head>
<body>
<div id="app">
  <div id="title">🍰 Xotira Oʻyini — Juftlik Toping</div>
  <div id="topbar">
    <div class="stat">🏆 <span id="levelLabel">1</span>-daraja</div>
    <div class="stat">🔄 Yurish: <span id="moves">0</span></div>
  </div>
  <div id="boardWrap">
    <div id="grid"></div>
    <div id="overlay">
      <div id="card2">
        <h2 id="oTitle">Tayyor?</h2>
        <p id="oText">Bir xil juftlik kartalarini toping! Ikki kartani ochib solishtiring.</p>
        <button class="bigBtn" id="oBtn">Boshlash</button>
      </div>
    </div>
  </div>
  <div id="hint">Kartalarni bosib juft toping</div>
</div>
<script>
(function(){
  const grid = document.getElementById('grid');
  const overlay = document.getElementById('overlay');
  const oTitle = document.getElementById('oTitle');
  const oText = document.getElementById('oText');
  const oBtn = document.getElementById('oBtn');
  const movesEl = document.getElementById('moves');
  const levelEl = document.getElementById('levelLabel');

  const emojiPool = ['🍓','🍬','🍭','🍩','🍪','🧁','🍒','🍋','🍇','🍉','🍑','🥝','🍍','🍫','🍦','🍡'];

  let level = 1;
  let moves = 0;
  let cards = [];
  let flipped = [];
  let matchedCount = 0;
  let busy = false;

  function pairsForLevel(lv){
    return Math.min(4 + lv, 12); // number of pairs
  }

  function setupLevel(lv){
    const pairs = pairsForLevel(lv);
    const chosen = shuffle([...emojiPool]).slice(0, pairs);
    let deck = shuffle([...chosen, ...chosen]).map((emoji, i)=>({id:i, emoji, flipped:false, matched:false}));
    cards = deck;
    flipped = [];
    matchedCount = 0;
    moves = 0;
    movesEl.textContent = 0;
    levelEl.textContent = lv;

    const cols = pairs <= 6 ? 4 : (pairs <= 10 ? 5 : 6);
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    renderGrid();
  }

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }

  function renderGrid(){
    grid.innerHTML = '';
    cards.forEach(cardData=>{
      const el = document.createElement('div');
      el.className = 'card' + (cardData.flipped||cardData.matched ? ' flipped' : '') + (cardData.matched ? ' matched' : '');
      el.textContent = (cardData.flipped || cardData.matched) ? cardData.emoji : '❓';
      el.addEventListener('click', ()=>onCardClick(cardData.id));
      grid.appendChild(el);
    });
  }

  function onCardClick(id){
    if(busy) return;
    const card = cards.find(c=>c.id===id);
    if(!card || card.flipped || card.matched) return;
    card.flipped = true;
    flipped.push(card);
    renderGrid();

    if(flipped.length===2){
      moves++;
      movesEl.textContent = moves;
      busy = true;
      const [a,b] = flipped;
      if(a.emoji === b.emoji){
        a.matched = true; b.matched = true;
        matchedCount += 2;
        flipped = [];
        busy = false;
        renderGrid();
        if(matchedCount === cards.length){
          setTimeout(()=>winLevel(), 300);
        }
      } else {
        setTimeout(()=>{
          a.flipped = false; b.flipped = false;
          flipped = [];
          busy = false;
          renderGrid();
        }, 700);
      }
    }
  }

  function winLevel(){
    level++;
    showOverlay('Ajoyib! 🎉', `Siz ${moves} yurishda topdingiz! Keyingi darajaga oʻtamizmi?`, 'Keyingi daraja', ()=>{
      setupLevel(level);
      hideOverlay();
    });
  }

  function showOverlay(title, text, btnLabel, onClick){
    oTitle.textContent = title;
    oText.textContent = text;
    oBtn.textContent = btnLabel;
    overlay.classList.remove('hide');
    oBtn.onclick = onClick;
  }
  function hideOverlay(){ overlay.classList.add('hide'); }

  setupLevel(level);
  showOverlay('Xotira Oʻyini 🍰', 'Bir xil juftlik kartalarini toping! Ikki kartani ochib solishtiring va barcha juftliklarni yeching.', 'Boshlash', ()=>{
    hideOverlay();
  });
})();
</script>
</body>
</html>
